name: Container

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: cr.yandex/${{ vars.YC_REGISTRY_ID }}/nko-linka-wordpress
  LOCAL_IMAGE: local/nko-linka-wordpress:${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/wordpress/Dockerfile
          load: true
          tags: ${{ env.LOCAL_IMAGE }}

      - name: Smoke test
        run: |
          docker run --rm \
            ${{ env.LOCAL_IMAGE }} \
            php -l /usr/src/wordpress/wp-content/mu-plugins/linka-nko-donations.php
          docker run --rm \
            ${{ env.LOCAL_IMAGE }} \
            php -l /usr/src/wordpress/wp-content/mu-plugins/linka-nko-registries.php
          docker run --rm \
            ${{ env.LOCAL_IMAGE }} \
            php -m | grep -qx imap
          docker run --rm \
            -v "${{ github.workspace }}/tests:/tests:ro" \
            ${{ env.LOCAL_IMAGE }} \
            php /tests/registries.php /usr/src/wordpress/wp-content/mu-plugins/linka-nko-registries.php
          docker run -d --rm \
            --name nko-linka-wordpress-smoke \
            -p 8080:8080 \
            -e WORDPRESS_DB_HOST=127.0.0.1:3306 \
            -e WORDPRESS_DB_NAME=wordpress \
            -e WORDPRESS_DB_USER=wordpress \
            -e WORDPRESS_DB_PASSWORD=wordpress \
            ${{ env.LOCAL_IMAGE }}
          sleep 10
          curl --fail --silent --show-error http://127.0.0.1:8080/healthz.php
          docker stop nko-linka-wordpress-smoke

      - name: Docker metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=tag

      - name: Login to Yandex Container Registry
        if: github.event_name != 'pull_request'
        run: |
          printf '%s' '${{ secrets.YC_SA_JSON_CREDENTIALS }}' | docker login --username json_key --password-stdin cr.yandex

      - name: Push tested image
        if: github.event_name != 'pull_request'
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            docker tag "${LOCAL_IMAGE}" "$tag"
            docker push "$tag"
          done <<< "$IMAGE_TAGS"
